{% extends "barraca/base.html" %}

{% block contenido %}
<div class="container mt-5" style="max-width: 900px; margin: 0 auto;">
    <h1>{{ post.titulo }}</h1>
    <p class="text-muted" style="font-size: 1.2rem;">{{ post.subtitulo }}</p>
    <hr>
    
    {% if post.imagen %}
        <div style="text-align: center; margin-bottom: 30px;">
            <img src="{{ post.imagen.url }}" alt="{{ post.titulo }}" style="width: 100%; max-height: 500px; object-fit: cover; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        </div>
    {% endif %}

    <div class="post-body" style="font-size: 1.1rem; line-height: 1.8;">
        
        {{ post.cuerpo|safe }}
    </div>

    <hr style="margin-top: 50px;">
    <p style="color: #888;"><small>Publicado por <strong>{{ post.autor }}</strong> el {{ post.fecha }}</small></p>
    
    <div style="margin-top: 30px; margin-bottom: 50px;">
        <a href="{% url 'listar_posts' %}" style="background: #333; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold;">
            ⬅ Volver al Blog
        </a>
    </div>
</div>
{% endblock %}
