{% extends "barraca/base.html" %}


{% block contenido %} 
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6" style="background: white; padding: 30px; border-radius: 10px; border: 1px solid #ddd;">
            <h2 class="text-center mb-4">Editar mi Perfil</h2>
            <hr>
            
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                {{ form.as_p }}
                
                <div class="mt-4">
                    <button type="submit" style="background-color: #ff9900; color: white; border: none; font-weight: bold; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer;">
                        Guardar Cambios
                    </button>
                    <a href="{% url 'inicio' %}" style="text-decoration: none; text-align: center; display: block; background-color: #666; color: white; padding: 10px; border-radius: 5px; font-weight: bold; margin-top: 10px;">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
